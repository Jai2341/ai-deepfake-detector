<!DOCTYPE html>
<html>
<head>
    <title>AI Deepfake Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- MATRIX BACKGROUND -->
<canvas id="matrixCanvas"></canvas>

<div class="container">
    <div class="box">

        <h1 class="title">AI Deepfake Detector</h1>

        <form method="POST" enctype="multipart/form-data">
            <p>Upload Image or Video</p><br>
            <input type="file" name="file" required><br><br>
            <button type="submit">Analyze</button>
        </form>

        <!-- LOADING SCANNER -->
        <div id="loader" class="loader hidden">
            <div class="scan"></div>
            <p>Scanning media for deepfake patterns...</p>
        </div>

        {% if filename %}
        <div class="result">
            <img src="{{ url_for('static', filename='uploads/' + filename) }}">
            <h2>{{ result }}</h2>
        </div>
        {% endif %}

    </div>
</div>

<script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
<script src="{{ url_for('static', filename='js/effects.js') }}"></script>

</body>
</html>
